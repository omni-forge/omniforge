name: Trigger Kaggle Training

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  trigger-kaggle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Kaggle API
        run: pip install 'kaggle>=1.6.0'

      - name: Setup Kaggle API Token
        run: |
          mkdir -p ~/.kaggle
          echo "${{ secrets.KAGGLE_API_TOKEN }}" > ~/.kaggle/access_token
          chmod 600 ~/.kaggle/access_token

      - name: Save RCLONE_CONF to dataset
        run: |
          echo "${{ secrets.RCLONE_CONF }}" > kaggle_dataset/rclone.conf
          cd kaggle_dataset
          kaggle datasets version -p . -m "Auto update from GitHub Actions"

      - name: Trigger Kaggle notebook run
        run: |
          kaggle kernels push -p kaggle_notebook
          echo "Kaggle training session triggered successfully"

      - name: Wait and check status
        run: |
          echo "Training is now running on Kaggle GPU"
          echo "It will run for up to 12 hours automatically"
          echo "Checkpoints are saved to Google Drive"
          echo "This workflow will trigger again tomorrow at 6AM UTC"
