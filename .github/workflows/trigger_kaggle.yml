name: Trigger Kaggle Training

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  trigger-kaggle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Kaggle API
        run: pip install kaggle

      - name: Setup Kaggle credentials
        run: |
          mkdir -p ~/.kaggle
          echo '{"username":"${{ secrets.KAGGLE_USERNAME }}","key":"${{ secrets.KAGGLE_API_TOKEN }}"}' > ~/.kaggle/kaggle.json
          chmod 600 ~/.kaggle/kaggle.json

      - name: Trigger Kaggle notebook run
        run: |
          kaggle kernels push -p kaggle_notebook
          echo "Kaggle training session triggered successfully"

      - name: Done
        run: |
          echo "Training is now running on Kaggle GPU"
          echo "Checkpoints save to Google Drive automatically"
          echo "Next trigger tomorrow at 6AM UTC"
